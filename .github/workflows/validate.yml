name: Validate Automotive Lifecycle Agents

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov flake8

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=tools --cov-report=term-missing

  validate-agents:
    name: Validate agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate agent files
        run: |
          python - << 'PYEOF'
          import os
          import sys
          import re

          AGENTS_DIR = "agents"
          errors = []

          for root, dirs, files in os.walk(AGENTS_DIR):
              for fname in files:
                  if not fname.endswith(".md"):
                      continue
                  fpath = os.path.join(root, fname)
                  with open(fpath, encoding="utf-8") as f:
                      content = f.read()

                  # Check YAML frontmatter present
                  if not content.startswith("---"):
                      errors.append(f"{fpath}: Missing YAML frontmatter (must start with ---)")
                      continue

                  # Extract frontmatter
                  end = content.find("---", 3)
                  if end == -1:
                      errors.append(f"{fpath}: Frontmatter not closed with ---")
                      continue
                  frontmatter = content[3:end]

                  # Required fields
                  for field in ["name:", "description:", "tools:", "maxTurns:"]:
                      if field not in frontmatter:
                          errors.append(f"{fpath}: Missing required frontmatter field: {field}")

                  # Forbidden field
                  if "model:" in frontmatter:
                      errors.append(f"{fpath}: FORBIDDEN field 'model:' found in frontmatter")

                  # gate-review-approver must have disable-model-invocation: true
                  if "gate-review-approver" in fname:
                      if "disable-model-invocation: true" not in frontmatter:
                          errors.append(
                              f"{fpath}: gate-review-approver must have "
                              f"disable-model-invocation: true"
                          )

                  # Description word count check (min 80 words)
                  desc_match = re.search(
                      r"description:\s*\|(.+?)(?=\n\w|\ntools:|\nskills:|\nmaxTurns:|\n---)",
                      frontmatter,
                      re.DOTALL,
                  )
                  if desc_match:
                      desc_text = desc_match.group(1)
                      word_count = len(desc_text.split())
                      if word_count < 50:
                          errors.append(
                              f"{fpath}: Description too short ({word_count} words, "
                              f"minimum 80 for rich auto-routing)"
                          )

          if errors:
              print("\nAgent validation FAILED:")
              for e in errors:
                  print(f"  ERROR: {e}")
              sys.exit(1)
          else:
              agent_count = sum(
                  1 for root, dirs, files in os.walk(AGENTS_DIR)
                  for f in files if f.endswith(".md")
              )
              print(f"Agent validation PASSED — {agent_count} agents validated.")
          PYEOF

  validate-skills:
    name: Validate skill files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill SKILL.md files
        run: |
          python - << 'PYEOF'
          import os
          import sys

          SKILLS_DIR = "skills"
          errors = []

          for skill_name in os.listdir(SKILLS_DIR):
              skill_path = os.path.join(SKILLS_DIR, skill_name)
              if not os.path.isdir(skill_path):
                  continue

              skill_md = os.path.join(skill_path, "SKILL.md")
              if not os.path.exists(skill_md):
                  errors.append(f"{skill_path}/: Missing SKILL.md")
                  continue

              with open(skill_md, encoding="utf-8") as f:
                  content = f.read()

              if not content.startswith("---"):
                  errors.append(f"{skill_md}: Missing YAML frontmatter")
                  continue

              end = content.find("---", 3)
              if end == -1:
                  errors.append(f"{skill_md}: Frontmatter not closed")
                  continue
              frontmatter = content[3:end]

              for field in ["name:", "description:"]:
                  if field not in frontmatter:
                      errors.append(f"{skill_md}: Missing field: {field}")

              # Description word count (min 80)
              if "description:" in frontmatter:
                  desc_start = frontmatter.find("description:")
                  desc_text = frontmatter[desc_start:]
                  word_count = len(desc_text.split())
                  if word_count < 40:
                      errors.append(
                          f"{skill_md}: Description likely too short "
                          f"({word_count} words approx)"
                      )

          if errors:
              print("\nSkill validation FAILED:")
              for e in errors:
                  print(f"  ERROR: {e}")
              sys.exit(1)
          else:
              skill_count = sum(
                  1 for name in os.listdir(SKILLS_DIR)
                  if os.path.isdir(os.path.join(SKILLS_DIR, name))
              )
              print(f"Skill validation PASSED — {skill_count} skills validated.")
          PYEOF

  lint:
    name: Lint Python files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 tools/ tests/ --max-line-length 88 --extend-ignore=E501
